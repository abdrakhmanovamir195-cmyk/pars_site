version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bdd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pip188
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  redis:
    image: redis:7
    networks:
      - appnet

  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn scraper.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DJANGO_SETTINGS_MODULE=scraper.settings
    networks:
      - appnet

  celery:
    build: .
    command: celery -A scraper worker --loglevel=info --pool=solo
    depends_on:
      - db
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=scraper.settings
    networks:
      - appnet

networks:
  appnet:
    driver: bridge