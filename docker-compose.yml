version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: bdd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pip188
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  web:
    build: .
    command: gunicorn scraper.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=scraper.settings

  celery:
    build: .
    command: celery -A scraper worker --loglevel=info --pool=solo
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=scraper.settings

volumes:
  postgres_data: