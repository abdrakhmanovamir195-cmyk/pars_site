
services:
  web:
    build: .
    container_name: web
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py createsuperuser --noinput --username root --email root@root.com && gunicorn scraper.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "9000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=scraper.settings
      - DJANGO_SUPERUSER_PASSWORD=1122
      - DJANGO_SUPERUSER_USERNAME=root
      - DJANGO_SUPERUSER_EMAIL=root@root.com
    networks:
      - appnet

  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_DB: bdd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pip188
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bdd"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  redis:
    image: redis:7
    container_name: redis
    networks:
      - appnet

  celery:
    build: .
    container_name: celery
    command: celery -A scraper worker --loglevel=info --pool=solo
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DJANGO_SETTINGS_MODULE=scraper.settings
    networks:
      - appnet

networks:
  appnet:
    driver: bridge